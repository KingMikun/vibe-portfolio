local backend: true

backend:
  name: github
  repo: KingMikun/vibe-portfolio
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: pages
    label: Pages
    files:
      - label: Home
        name: home
        file: public/content/pages/home.md
        fields:
          - label: Title
            name: title
            widget: string
          - label: Subtitle
            name: subtitle
            widget: string
      - label: About
        name: about
        file: public/content/pages/about.md
        fields:
          - label: Title
            name: title
            widget: string
          - label: Content
            name: body
            widget: markdown
      - label: Contact
        name: contact
        file: public/content/pages/contact.md
        fields:
          - label: Email
            name: email
            widget: string
          - label: Twitter
            name: twitter
            widget: string
          - label: GitHub
            name: github
            widget: string
          - label: LinkedIn
            name: linkedin
            widget: string
  - name: projects
    label: Projects
    folder: public/content/projects
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Description
        name: description
        widget: text
      - label: Link
        name: link
        widget: string
        required: false
      - label: Tags
        name: tags
        widget: list
      - label: Order
        name: order
        widget: number
        default: 0
